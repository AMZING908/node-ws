<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VideoHub - Watch Videos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f1f1f1;
}

/* Header */

header{
background:#202020;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
}

.search input{
padding:8px;
width:300px;
border:none;
border-radius:3px;
}

/* Layout */

.container{
display:flex;
}

/* Sidebar */

.sidebar{
width:200px;
background:white;
height:100vh;
padding-top:20px;
border-right:1px solid #ddd;
}

.sidebar a{
display:block;
padding:12px 20px;
text-decoration:none;
color:#333;
}

.sidebar a:hover{
background:#f0f0f0;
}

/* Video grid */

.content{
flex:1;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

/* Video card */

.video-card{
background:white;
border-radius:6px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.video-card video{
width:100%;
}

.video-info{
padding:12px;
}

.video-title{
font-size:16px;
font-weight:bold;
margin-bottom:5px;
}

.channel{
color:#777;
font-size:13px;
}

</style>
</head>

<body>

<header>

<div class="logo">VideoHub</div>

<div class="search">
<input type="text" placeholder="Search videos...">
</div>

</header>

<div class="container">

<div class="sidebar">
<a href="#">Home</a>
<a href="#">Trending</a>
<a href="#">Music</a>
<a href="#">Gaming</a>
<a href="#">Education</a>
<a href="#">Sports</a>
</div>

<div class="content">

<h2>Recommended Videos</h2>

<div class="grid">

<div class="video-card">
<video controls>
<source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
</video>
<div class="video-info">
<div class="video-title">Big Buck Bunny</div>
<div class="channel">Nature Channel</div>
</div>
</div>

<div class="video-card">
<video controls>
<source src="https://www.w3schools.com/html/movie.mp4" type="video/mp4">
</video>
<div class="video-info">
<div class="video-title">Sample Movie</div>
<div class="channel">Movie Studio</div>
</div>
</div>

<div class="video-card">
<video controls>
<source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
</video>
<div class="video-info">
<div class="video-title">Wildlife Documentary</div>
<div class="channel">Discovery Media</div>
</div>
</div>

<div class="video-card">
<video controls>
<source src="https://www.w3schools.com/html/movie.mp4" type="video/mp4">
</video>
<div class="video-info">
<div class="video-title">Technology Review</div>
<div class="channel">Tech World</div>
</div>
</div>

</div>

</div>

</div>

</body>
</html>
